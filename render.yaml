services:
  - type: web
    name: strawmind-core-cloud
    runtime: python
    plan: free
    buildCommand: pip install -r 03_CODE/requirements.txt
    startCommand: cd 03_CODE && python app_cloud.py
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: PORT
        value: 5000
      - key: NODE_ID
        value: bed-01
      - key: MODEL_PATH
        value: /opt/render/project/src/02_MODEL/yolov8n_best.onnx
      - key: MQTT_HOST
        value: 3b8fa1f55fa44b14a8def756f361a0c1.s1.eu.hivemq.cloud
      - key: MQTT_PORT
        value: 8883
      - key: MQTT_TOPIC_PREFIX
        value: strawmind
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
